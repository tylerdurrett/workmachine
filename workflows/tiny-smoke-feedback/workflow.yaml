slug: tiny-smoke-feedback
name: Tiny Smoke (Feedback)
description: >-
  The engine's committed feedback-threading example. One script step writes a
  greeting that interpolates {{feedback.note}}, then a review gate waits for a
  decision. On request_changes the gate re-opens (one card per gate) and the
  step re-runs with the reviewer's note threaded into its command, so the re-run
  legitimately differs — exercising the request_changes -> tick -> approve ->
  tick loop end to end.
inputs:
  name:
    type: string
    description: Who to greet; substituted into the greeting text.
  scriptPath:
    type: string
    description: >-
      Absolute path to the committed greet.sh. The step locates its script via
      this input because the resolver has no {{workflow.dir}} token.
steps:
  - id: greet
    type: script
    run: 'sh "{{inputs.scriptPath}}" "{{inputs.name}}" "{{artifacts.greeting.path}}" "{{feedback.note}}"'
    produces:
      - id: greeting
        path: artifacts/greeting.txt
  - id: review
    type: gate
    needs:
      - greet
    allowed_decisions:
      - approve
      - request_changes
      - reject
